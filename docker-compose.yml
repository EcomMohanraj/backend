version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: milky-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: milky_mushrooms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: milky-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/milky_mushrooms?schema=public"
      SESSION_SECRET: "milky-mushrooms-super-secret-key-15803d-green"
      PORT: 5000
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: milky-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
